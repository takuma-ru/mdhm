name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Release level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - preup
          - fix
      pre:
        description: Release as a pre-release
        required: true
        default: false
        type: boolean
      exactVersion:
        description: Release an exact version instead of incrementing
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          args=(--level "${{ inputs.level }}")
          if [[ "${{ inputs.pre }}" == "true" ]]; then
            args+=(--pre)
          fi
          if [[ -n "${{ inputs.exactVersion }}" ]]; then
            args+=(--exact-version "${{ inputs.exactVersion }}")
          fi
          pnpm release "${args[@]}"
